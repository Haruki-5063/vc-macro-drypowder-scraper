name: Run Micro Alpha Watchlist Generator

on:
  schedule:
    # 毎週日曜日の日本時間夜21:00（UTC 12:00）に全米を自動スキャン
    - cron: '0 12 * * 0'
  workflow_dispatch: # 手動でいつでも実行可能にするボタン

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests yfinance gspread google-auth

    - name: Execute Watchlist Engine
      env:
        GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
      run: |
        python main.py
