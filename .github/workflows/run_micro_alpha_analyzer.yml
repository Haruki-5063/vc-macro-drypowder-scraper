name: Run Micro Alpha Analyzer

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  run-analyzer:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        # cache: 'pip'  <-- エラーの原因であるこの行を冷酷に削除

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests yfinance gspread google-auth beautifulsoup4 google-genai

    - name: Run Script
      env:
        GCP_SERVICE_ACCOUNT_KEY: ${{ secrets.GCP_SERVICE_ACCOUNT_KEY }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        python -c "
        with open('micro_alpha_analyzer.py', 'r') as f:
            code = f.read()
        code = code.replace('あなたのスプレッドシートID', '${{ secrets.SPREADSHEET_ID }}')
        with open('micro_alpha_analyzer_run.py', 'w') as f:
            f.write(code)
        "
        python micro_alpha_analyzer_run.py
